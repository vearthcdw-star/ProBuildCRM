function createCO(){
  const pid=document.getElementById('cop')?.value;
  const desc=document.getElementById('cod')?.value||'Change order details pending.';
  const amt=parseFloat(document.getElementById('coa')?.value)||0;
  const by=document.getElementById('cob')?.value||CU?.name;
  const proj=LEADS.find(l=>l.id===pid);if(!proj)return;
  const id='CO-'+((COS?.length||0)+1).toString().padStart(3,'0');
  const notified=['Operations',proj.rep,'Gev Ashnalikyan','Josh Adirim','Noam Hasman'];
  if(coFin)notified.push('Pat Adirim');
  COS.push({id,projectId:pid,woNum:proj.woNum,projectName:proj.name,status:'pending',description:desc,originalAmt:proj.value,changeAmt:amt,newTotal:proj.value+amt,financeRequired:!!coFin,requestedBy:by,requestedDate:new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}),notified,approvedBy:null,approvedDate:null,ts:nowTS()});
  proj.status='change_order_needed';
  fireNotif(id+' created for '+proj.name+'. Notified: '+notified.join(', ')+'.','success');rFin();
}

