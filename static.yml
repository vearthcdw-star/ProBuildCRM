    <div class="su-av" id="su-av">MM</div>
    <div>
      <div style="color:var(--white);font-size:12px;font-weight:700;" id="su-name">Manny Mann</div>
      <div style="color:var(--dimmed);font-size:9px;font-family:'DM Mono',monospace;" id="su-role">Market Expansion Advisor</div>
    </div>
  </div>
