function switchUser(uname){
  if(!uname)return;
  const user=USERS[uname];if(!user)return;
  CU={...user,username:uname};
  document.getElementById('su-name').textContent=user.name;
  document.getElementById('su-role').textContent=user.title;
  document.getElementById('su-av').textContent=user.initials;
  const cn=document.getElementById('nb-commission');
  if(cn)cn.style.display=(uname==='manny')?'none':'';
  document.getElementById('user-switcher').value='';
  fireNotif('Switched to: '+user.name+' ('+user.title+')','info');
  nav(curMod);
}

function populateUserSwitcher(){
  const sel=document.getElementById('user-switcher');if(!sel)return;
  const sorted=Object.entries(USERS).sort((a,b)=>a[1].name.localeCompare(b[1].name));
  sorted.forEach(([k,u])=>{
    const opt=document.createElement('option');
    opt.value=k;opt.textContent=u.name+' — '+u.title;
    sel.appendChild(opt);
  });
}

