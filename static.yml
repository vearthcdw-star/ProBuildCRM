  <div style="color:var(--dimmed);font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.08em;margin-bottom:4px;">FINANCE TEAM</div>
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;"><div class="sf-av">PA</div><div><div style="color:var(--white);font-size:11px;font-weight:600;">Pat Adirim</div><div style="color:var(--dimmed);font-size:9px;font-family:'DM Mono',monospace;">Finance Manager / Sales Admin</div></div></div>
  <div style="display:flex;align-items:center;gap:6px;"><div class="sf-av">DA</div><div><div style="color:var(--white);font-size:11px;font-weight:600;">Daniel Alcalde</div><div style="color:var(--dimmed);font-size:9px;font-family:'DM Mono',monospace;">A/R &middot; A/P &middot; Events</div></div></div>
</div>
