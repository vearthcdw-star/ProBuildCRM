ent.getElementById(\'cofy\').style.color=\'#7A8FA8\';coFin=false;" style="background:none;color:#7A8FA8;border:1px solid #162540;border-radius:7px;padding:6px 11px;font-size:10px;cursor:pointer;font-family:\'Barlow Condensed\',sans-serif;font-weight:700;">Cash / No Finance</button></div></div><div style="padding:8px 11px;background:#0D3060;border-radius:8px;border:1px solid #1B5FAA40;margin-bottom:13px;"><div style="color:#1B5FAA;font-size:10px;">Auto-notified: Operations &middot; Sales Rep &middot; Gev Ashnalikyan &middot; Josh Adirim &middot; Noam Hasman</div></div><div style="display:flex;gap:7px;"><button class="btn btn-ghost btn-md" onclick="this.closest(\'.modal-overlay\').remove()" style="flex:1;">CANCEL</button><button class="btn btn-warning btn-md" onclick="createCO();this.closest(\'.modal-overlay\').remove();" style="flex:2;">CREATE + NOTIFY TEAM</button></div></div></div>');
