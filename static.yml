function fireNotif(msg,type='success'){
  NOTIFS.unshift({msg,type,time:nowTS(),read:false});
  updateBadges();
  const colors={success:['#0A2818','#1DB954'],warning:['#2A1500','#F5842A'],danger:['#2A0A0C','#E8424A'],info:['#0D3060','#1B5FAA']};
  const [bg,co]=colors[type]||colors.info;
  const b=document.createElement('div');
  b.style.cssText='position:fixed;bottom:65px;right:20px;z-index:9999;max-width:390px;background:'+bg+';border:1px solid '+co+'40;color:'+co+';border-radius:10px;padding:11px 14px;font-size:11px;font-family:\'DM Mono\',monospace;box-shadow:0 8px 24px #00000060;display:flex;justify-content:space-between;align-items:center;gap:10px;animation:fadeIn .3s ease;';
  b.innerHTML='<span>'+msg+'</span><button onclick="this.parentElement.remove()" style="background:none;border:none;cursor:pointer;color:inherit;font-size:14px;flex-shrink:0;">&times;</button>';
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),6000);
}

function updateBadges(){
  const unread=NOTIFS.filter(n=>!n.read).length;
  const nc=document.getElementById('notif-cnt');
  if(nc){nc.textContent=unread;nc.style.display=unread>0?'':'none';}
  renderNotifPanel();
  const finC=LEADS.filter(l=>['finance_declined','pending_finance','change_order_needed'].includes(l.status)).length+(COS.filter?.(c=>c.status==='pending').length||0);
  const opsC=LEADS.filter(l=>['finance_declined','change_order_needed','hoa_pending','hoa_denied'].includes(l.status)).length;
  const fb=document.getElementById('fin-badge'),ob=document.getElementById('ops-badge');
  if(fb){fb.textContent=finC;fb.style.display=finC>0?'':'none';}
  if(ob){ob.textContent=opsC;ob.style.display=opsC>0?'':'none';}
}
function renderNotifPanel(){
  const list=document.getElementById('notif-list');
  const lbl=document.getElementById('notif-unread-lbl');
  if(!list)return;
  const u=NOTIFS.filter(n=>!n.read).length;
  if(lbl)lbl.textContent=u+' unread';
  list.innerHTML=NOTIFS.slice(0,10).map((n,i)=>{
    const c=n.type==='success'?'#1DB954':n.type==='warning'?'#F5842A':n.type==='danger'?'#E8424A':'#1B5FAA';
    return '<div style="padding:9px 13px;border-bottom:'+(i<9?'1px solid #162540':'none')+';display:flex;gap:9px;align-items:flex-start;background:'+(!n.read?'#1B5FAA08':'transparent')+';"><div style="width:6px;height:6px;border-radius:50%;background:'+c+';margin-top:5px;flex-shrink:0;"></div><div><div style="color:#F0F5FF;font-size:11px;line-height:1.5;">'+n.msg+'</div><div style="color:#3A4F68;font-size:9px;font-family:\'DM Mono\',monospace;margin-top:1px;">'+n.time+'</div></div></div>';
  }).join('')||'<div style="padding:18px;text-align:center;color:#3A4F68;font-size:11px;">No notifications yet.</div>';
}
function cancelJob(id){
  const l=LEADS.find(l=>l.id===id);if(!l)return;
  if(confirm('Cancel project for '+l.name+'?\n\nNotify: Operations, '+l.rep+', Gev Ashnalikyan, Josh Adirim.\n\nThis cannot be undone.')){
    l.status='canceled';
    fireNotif('Job CANCELED: '+l.name+' ('+(l.woNum||l.id)+') Notified: Ops, '+l.rep+', Gev, Josh.','warning');
    nav(curMod);
  }
}
