    msgs.innerHTML+='<div style="display:flex;gap:7px;"><div style="width:21px;height:21px;border-radius:5px;background:linear-gradient(135deg,var(--blue),var(--gold));display:flex;align-items:center;justify-content:center;font-size:10px;">✦</div><div style="background:var(--navyHover);border-radius:2px 12px 12px 12px;padding:9px 12px;color:#E8424A;font-size:12px;border:1px solid var(--navyBorder);">Connection error. Please try again.</div></div>';
