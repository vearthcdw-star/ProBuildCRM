  const salesReps=Object.values(USERS).filter(u=>u.dept==='Sales');
  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><div><h2 style="color:#F0F5FF;font-size:22px;font-family:\'Barlow Condensed\',sans-serif;font-weight:800;letter-spacing:.05em;margin:0 0 3px;">COMMISSIONS</h2><p style="color:#7A8FA8;font-size:11px;margin:0;">Managed by Pat Adirim &middot; Restricted access</p></div>'+(isAdmin?'<button class="btn btn-gold btn-md" onclick="showUploadComm()">+ UPLOAD COMMISSION</button>':'')+'</div>';
  h+='<div style="background:#2A1500;border:1px solid #F5842A40;border-radius:10px;padding:11px 14px;margin-bottom:16px;"><div style="color:#F5842A;font-size:10px;font-family:\'DM Mono\',monospace;font-weight:700;margin-bottom:3px;">&#9888; RESTRICTED ACCESS</div><div style="color:#7A8FA8;font-size:11px;">Uploaded by Pat Adirim. Each rep sees only their own commissions. Admins: Josh Adirim, Aaron Adirim, Raquel Sanchez. Manny Mann has no access to commission data.</div></div>';
  if(isAdmin){
    h+='<div class="card" style="padding:18px;"><div class="sh">All Sales Rep Commissions &mdash; Admin View</div>';
    salesReps.forEach(rep=>{
      const rcs=COMMS[rep.name]||[];const tot=rcs.reduce((a,c)=>a+c.amount,0);
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #162540;"><div style="display:flex;gap:7px;align-items:center;"><div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1B5FAA,#0D3060);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#F0F5FF;font-family:\'Barlow Condensed\',sans-serif;">'+rep.initials+'</div><div><div style="color:#F0F5FF;font-size:12px;font-weight:600;">'+rep.name+'</div><div style="color:#3A4F68;font-size:9px;font-family:\'DM Mono\',monospace;">'+rep.title+' &middot; SP #'+(rep.sp||'—')+'</div></div></div><div style="text-align:right;"><div style="color:#E8B84B;font-family:\'DM Mono\',monospace;font-weight:700;font-size:13px;">'+fmt$(tot)+'</div><div style="color:#3A4F68;font-size:9px;">'+rcs.length+' entries</div></div></div>';
    });
    h+='</div>';
  } else {
    h+='<div class="card" style="padding:18px;"><div class="sh">My Commission Records &mdash; '+CU?.name+'</div>';
    const myComms=COMMS[CU?.name]||[];
    if(myComms.length===0)h+='<div style="color:#7A8FA8;font-size:12px;text-align:center;padding:20px 0;">No commission records uploaded yet. Contact Pat Adirim.</div>';
    myComms.forEach((c,i,arr)=>{h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:'+(i<arr.length-1?'1px solid #162540':'none')+'"><div><div style="color:#F0F5FF;font-size:12px;font-weight:600;">'+c.project+'</div><div class="ts">'+c.uploadedBy+' &middot; '+c.ts+'</div></div><div style="color:#1DB954;font-family:\'DM Mono\',monospace;font-weight:700;font-size:13px;">'+fmt$(c.amount)+'</div></div>';});
    h+='</div>';
  }
  el.innerHTML=h;
}

function showUploadComm(){
  const reps=Object.values(USERS).filter(u=>u.dept==='Sales');
  let ropts=reps.map(u=>'<option>'+u.name+'</option>').join('');
  document.body.insertAdjacentHTML('beforeend','<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;"><div style="color:#F0F5FF;font-family:\'Barlow Condensed\',sans-serif;font-size:19px;font-weight:800;letter-spacing:.06em;">UPLOAD COMMISSION</div><button onclick="this.closest(\'.modal-overlay\').remove()" style="background:none;border:none;color:#7A8FA8;cursor:pointer;font-size:17px;">&times;</button></div><div style="background:#2A1500;border:1px solid #F5842A40;border-radius:8px;padding:9px 11px;margin-bottom:13px;"><div style="color:#F5842A;font-size:9px;font-family:\'DM Mono\',monospace;">Only this rep + Josh, Aaron, Raquel can see this entry. Manny has no access.</div></div><div class="fg"><label class="fl">SALES REP</label><select id="cm-r" class="fi">'+ropts+'</select></div><div class="fg"><label class="fl">PROJECT / DESCRIPTION</label><input id="cm-p" class="fi" placeholder="e.g. WO-12345 — Smith Install"/></div><div class="fg"><label class="fl">COMMISSION AMOUNT ($)</label><input id="cm-a" class="fi" type="number" placeholder="0"/></div><div style="padding:7px 11px;background:#0A2818;border-radius:8px;border:1px solid #1DB95440;margin-bottom:13px;"><div style="color:#1DB954;font-size:9px;font-family:\'DM Mono\',monospace;">Uploaded by: Pat Adirim &middot; '+nowTS()+'</div></div><div style="display:flex;gap:7px;"><button class="btn btn-ghost btn-md" onclick="this.closest(\'.modal-overlay\').remove()" style="flex:1;">CANCEL</button><button class="btn btn-gold btn-md" onclick="uploadComm();this.closest(\'.modal-overlay\').remove();" style="flex:2;">UPLOAD COMMISSION RECORD</button></div></div></div>');
}
function uploadComm(){
  const rep=document.getElementById('cm-r')?.value;
  const proj=document.getElementById('cm-p')?.value||'—';
  const amt=parseFloat(document.getElementById('cm-a')?.value)||0;
  if(!COMMS[rep])COMMS[rep]=[];
  COMMS[rep].push({project:proj,amount:amt,uploadedBy:'Pat Adirim',ts:nowTS()});
  fireNotif('Commission uploaded for '+rep+': '+fmt$(amt)+' — Visible to rep + admins only.','success');
  rCommission();
}

document.getElementById('tb-date').textContent=todayStr();

function switchUser(uname){
  if(!uname)return;
  const user=USERS[uname];if(!user)return;
  CU={...user,username:uname};
  document.getElementById('su-name').textContent=user.name;
  document.getElementById('su-role').textContent=user.title;
  document.getElementById('su-av').textContent=user.initials;
  const cn=document.getElementById('nb-commission');
  if(cn)cn.style.display=(uname==='manny')?'none':'';
  document.getElementById('user-switcher').value='';
  fireNotif('Switched to: '+user.name+' ('+user.title+')','info');
  nav(curMod);
}

function populateUserSwitcher(){
  const sel=document.getElementById('user-switcher');if(!sel)return;
  const sorted=Object.entries(USERS).sort((a,b)=>a[1].name.localeCompare(b[1].name));
  sorted.forEach(([k,u])=>{
    const opt=document.createElement('option');
    opt.value=k;opt.textContent=u.name+' — '+u.title;
    sel.appendChild(opt);
  });
}

// AUTO-LAUNCH: No login required for CDW platform
(function(){
  CU={...USERS['manny'], username:'manny'};
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('dtog').style.display='flex';
  document.getElementById('su-name').textContent=CU.name;
  document.getElementById('su-role').textContent=CU.title;
  document.getElementById('su-av').textContent=CU.initials;
  document.getElementById('tb-date').textContent=todayStr();
  // Commission nav hidden from manny
  const cn=document.getElementById('nb-commission');
  if(cn)cn.style.display='none';
  // DEMO MODE ON by default
  toggleDemo();
  nav('dashboard');
  populateUserSwitcher();
})();

</script>
</body>
</html>
