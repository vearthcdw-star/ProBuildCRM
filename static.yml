  msgs.scrollTop=msgs.scrollHeight;
  const sys='You are the CDW Operations AI for California Deluxe Windows Industries (CSLB #774518). HQ: 20735 Superior St, Chatsworth CA. Key people: Josh Adirim (President), Aaron Adirim (Owner), Dennis Gorgolinski (VP Ops), Gev Ashnalikyan (Sales Mgr), Joyce Bosnoyan (HOA/CS), Rosario Alvarenga (Install Sched), David Soriano (Factory Ext 122), Pat Adirim (Finance Manager / Sales Admin, 818-822-2160, pat@cdwindows.com), Daniel Alcalde (A/R), Noam Hasman (Mktg). Finance: Cash=10% or $1K down (lesser), 40% at measure, 25% install morning, rest at completion. Finance declined=notify Ops, Sales Rep, Gev, Josh, Noam. HOA: Joyce sends request; if approved, Rosario sends to David Soriano; if denied, Joyce notifies Sales Rep. CO: always notify Ops, Sales Rep, Gev, Josh, Noam; +Pat if finance; must approve before manufacturing. Commission: Pat uploads; only rep+Josh+Aaron+Raquel can view. Manny has NO commission access. Current: user='+CU?.name+', module='+curMod+', demo='+demoMode+', projects='+LEADS.length+', pending COs='+(COS.filter?.(c=>c.status==="pending").length||0)+'. Be direct and operational.';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:[{role:'user',content:msg}]})});
    const data=await res.json();
    document.getElementById(lid)?.remove();
