    msgs.innerHTML+='<div style="display:flex;gap:7px;"><div style="width:21px;height:21px;border-radius:5px;background:linear-gradient(135deg,var(--blue),var(--gold));display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:2px;">✦</div><div style="max-width:84%;padding:9px 12px;border-radius:2px 12px 12px 12px;background:var(--navyHover);color:var(--white);font-size:12px;line-height:1.65;border:1px solid var(--navyBorder);">'+reply+'</div></div>';
  }catch{
