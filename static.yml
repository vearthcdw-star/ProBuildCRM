  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><div><h2 style="color:#F0F5FF;font-size:22px;font-family:\'Barlow Condensed\',sans-serif;font-weight:800;letter-spacing:.05em;margin:0 0 3px;">OPERATIONS PIPELINE</h2><p style="color:#7A8FA8;font-size:11px;margin:0;">'+LEADS.filter(l=>PIPE.includes(l.status)).length+' active jobs</p></div></div><div class="pipe-board">';
  PIPE.forEach(stage=>{
    const cards=grouped[stage]||[];const sc2=SC[stage];
    h+='<div class="pipe-col"><div class="pipe-hdr" style="border-bottom-color:'+(sc2?.color||'#7A8FA8')+';background:'+(sc2?.dim||'#0D1B2E')+'"><div style="color:'+(sc2?.color||'#7A8FA8')+';font-size:7px;font-family:\'DM Mono\',monospace;font-weight:800;letter-spacing:.1em;">'+(sc2?.label||stage).toUpperCase()+'</div><div style="display:flex;justify-content:space-between;margin-top:2px;"><span style="color:#7A8FA8;font-size:9px;">'+cards.length+'</span><span style="color:#E8B84B;font-size:9px;font-family:\'DM Mono\',monospace;">'+(cards.length?fmt$(cards.reduce((a,l)=>a+l.value,0)):'—')+'</span></div></div><div class="pipe-cards">';
    if(cards.length===0)h+='<div style="color:#3A4F68;font-size:9px;text-align:center;padding:14px 0;">—</div>';
    cards.forEach(c=>{
      h+='<div class="pipe-card" onmouseenter="this.style.borderColor=\''+(sc2?.color||'#7A8FA8')+'\'" onmouseleave="this.style.borderColor=\'#162540\'" onclick="showDetail(\''+c.id+'\')">';
      h+='<div style="display:flex;justify-content:space-between;margin-bottom:2px;">'+etag(c.entity)+'<span style="color:#3A4F68;font-size:7px;font-family:\'DM Mono\',monospace;">'+(c.woNum||c.id)+'</span></div>';
      h+='<div style="color:#F0F5FF;font-size:9px;font-weight:700;line-height:1.3;margin-bottom:2px;">'+c.name+'</div>';
      h+='<div style="color:#E8B84B;font-size:9px;font-family:\'DM Mono\',monospace;font-weight:700;">'+fmt$(c.value)+'</div>';
      if(c.hoa)h+='<div style="color:#E8B84B;font-size:8px;margin-top:1px;">HOA '+(c.hoaStatus||'').toUpperCase()+'</div>';
      if(c.status!=='canceled')h+='<button onclick="event.stopPropagation();cancelJob(\''+c.id+'\');rOps();" style="background:#E8424A;border:none;border-radius:4px;padding:2px 5px;color:white;font-size:7px;cursor:pointer;margin-top:2px;font-family:\'Barlow Condensed\',sans-serif;font-weight:700;">&times; CANCEL</button>';
      h+='</div>';
    });
    h+='</div></div>';
  });
  h+='</div><div class="g2" style="margin-top:16px;"><div class="card" style="padding:16px;"><div class="sh">Pending Action</div>';
  const pend=LEADS.filter(l=>['finance_declined','change_order_needed','hoa_pending','hoa_denied','service_warranty'].includes(l.status));
  if(pend.length===0)h+='<div style="color:#1DB954;font-size:11px;text-align:center;padding:10px 0;">&#10003; No pending issues</div>';
  pend.forEach((p,i,arr)=>{
    h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:'+(i<arr.length-1?'1px solid #162540':'none')+';"><div><div style="color:#F0F5FF;font-size:11px;font-weight:600;">'+p.name+'</div>'+chip(p.status)+'</div><div style="display:flex;gap:5px;align-items:center;"><span style="color:#3A4F68;font-size:9px;font-family:\'DM Mono\',monospace;">'+(p.woNum||p.id)+'</span>'+(p.status==='hoa_pending'&&(CU?.username==='joyce'||CU?.access==='all')?'<button onclick="approveHOA(\''+p.id+'\')" class="btn btn-sm btn-success" style="font-size:9px;padding:3px 6px;">&#10003; HOA</button><button onclick="denyHOA(\''+p.id+'\')" class="btn btn-sm btn-danger" style="font-size:9px;padding:3px 6px;">&times; HOA</button>':'')+'</div></div>';
  });
  h+='</div><div class="card" style="padding:16px;"><div class="sh">&#10003; Cleared for Production</div>';
