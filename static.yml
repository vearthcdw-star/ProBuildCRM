  </div>
  <div style="display:flex;gap:7px;align-items:center;">
    <div style="position:relative;">
      <button id="notif-btn" onclick="toggleNotif()" style="background:var(--navyHover);border:1px solid var(--navyBorder);border-radius:8px;padding:6px 11px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;">
        &#128276;<span id="notif-cnt" style="background:var(--red);color:var(--white);border-radius:10px;font-size:9px;font-family:'DM Mono',monospace;font-weight:700;padding:1px 5px;display:none;"></span>
