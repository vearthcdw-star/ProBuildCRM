<div id="ai-panel">
<div style="padding:13px 16px;border-bottom:1px solid var(--navyBorder);display:flex;justify-content:space-between;align-items:center;background:var(--navy);">
  <div style="display:flex;align-items:center;gap:9px;">
    <div style="width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--gold));display:flex;align-items:center;justify-content:center;font-size:14px;">&#10022;</div>
    <div>
      <div style="color:var(--white);font-weight:800;font-size:13px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;">CDW AI ASSISTANT</div>
