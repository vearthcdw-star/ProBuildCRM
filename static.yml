  h+='<div class="g4" style="margin-bottom:16px;"><div class="sc"><div class="sl">MY PROJECTS</div><div class="sv" style="color:#F0F5FF;">'+mine.length+'</div></div><div class="sc"><div class="sl">CHANGE ORDERS</div><div class="sv" style="color:#F5842A;">'+mine.filter(l=>l.status==='change_order_needed').length+'</div></div><div class="sc"><div class="sl">HOA PENDING</div><div class="sv" style="color:#E8B84B;">'+mine.filter(l=>l.status==='hoa_pending').length+'</div></div><div class="sc"><div class="sl">MY REVENUE</div><div class="sv" style="color:#E8B84B;">'+fmt$(mine.reduce((a,l)=>a+l.value,0))+'</div></div></div>';
  if(mine.length===0){h+='<div class="card" style="padding:44px;text-align:center;"><div style="color:#7A8FA8;font-size:13px;margin-bottom:13px;">No deals assigned yet.</div><button class="btn btn-primary btn-md" onclick="nav(\'marketing\')">GO TO MARKETING</button></div>';}
  else{
    h+='<div style="display:flex;flex-direction:column;gap:8px;">';
    mine.forEach(l=>{
      const rec=FR[l.id];
      const paid=rec?rec.payments.reduce((a,p)=>a+p.collected,0):0;
      const owed=rec?rec.payments.reduce((a,p)=>a+p.due,0):0;
      const hasAlert=['change_order_needed','finance_declined','pending_finance','hoa_denied'].includes(l.status);
      const ac=l.status==='finance_declined'||l.status==='hoa_denied'?'#E8424A':l.status==='change_order_needed'?'#F5842A':'#7C5CEF';
      h+='<div style="background:#0D1B2E;border-radius:12px;padding:14px;border:1px solid '+(hasAlert?ac+'50':'#162540')+';display:grid;grid-template-columns:1fr auto;gap:13px;align-items:center;"><div><div style="display:flex;gap:6px;align-items:center;margin-bottom:3px;">'+etag(l.entity)+'<span style="color:#3A4F68;font-family:\'DM Mono\',monospace;font-size:9px;">'+(l.woNum||l.id)+'</span>'+(l.hoa?'<span class="hoa-b">HOA</span>':'')+'</div><div style="color:#F0F5FF;font-weight:700;font-size:13px;margin-bottom:3px;">'+l.name+'</div><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:'+(rec&&owed>0?'6px':'0')+'">'+chip(l.status)+'<span style="color:#7A8FA8;font-size:10px;">'+l.city+' &middot; '+l.source+'</span></div>'+(rec&&owed>0?'<div style="display:flex;align-items:center;gap:7px;"><div class="pb" style="width:120px;height:5px;"><div class="pf" style="width:'+Math.round((paid/owed)*100)+'%;background:'+(paid===owed?'#1DB954':'#1B5FAA')+'"></div></div><span style="color:#7A8FA8;font-size:10px;font-family:\'DM Mono\',monospace;">'+fmt$(paid)+'/'+fmt$(owed)+'</span></div>':'')+'</div><div style="text-align:right;"><div style="color:#E8B84B;font-family:\'DM Mono\',monospace;font-weight:800;font-size:13px;">'+fmt$(l.value)+'</div><div style="display:flex;gap:4px;margin-top:7px;justify-content:flex-end;"><button onclick="showDetail(\''+l.id+'\')" class="btn btn-sm btn-outline">VIEW &rarr;</button>'+(l.status!=='canceled'?'<button onclick="cancelJob(\''+l.id+'\')" class="btn btn-sm btn-danger">&times;</button>':'')+'</div></div></div>';
    });
    h+='</div>';
