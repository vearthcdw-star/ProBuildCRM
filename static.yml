function rFinPay(el,tc,td){
  let h='<div class="g3" style="margin-bottom:16px;"><div class="sc"><div class="sl">COLLECTED</div><div class="sv" style="color:#1DB954;">'+fmt$(tc)+'</div></div><div class="sc"><div class="sl">PENDING A/R</div><div class="sv" style="color:#F5842A;">'+fmt$(td-tc)+'</div></div><div class="sc"><div class="sl">LENDER DRAWS</div><div class="sv" style="color:#7C5CEF;">'+fmt$(Object.values(FR).filter(r=>r.type==='finance').flatMap(r=>r.payments).filter(p=>p.due>10000).reduce((a,p)=>a+p.due,0))+'</div></div></div>';
  if(Object.keys(FR).length===0)h+='<div class="card" style="padding:36px;text-align:center;"><div style="color:#7A8FA8;font-size:12px;">No payment records yet.</div></div>';
  Object.entries(FR).forEach(([pid,rec])=>{
    const proj=LEADS.find(l=>l.id===pid);if(!proj)return;
    const paid=rec.payments.reduce((a,p)=>a+p.collected,0),owed=rec.payments.reduce((a,p)=>a+p.due,0);
    const pct=owed>0?Math.round((paid/owed)*100):0;
    h+='<div class="card" style="padding:18px;margin-bottom:11px;"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;"><div>'+etag(proj.entity)+'&nbsp;<span style="color:#3A4F68;font-family:\'DM Mono\',monospace;font-size:9px;">'+(proj.woNum||pid)+'</span>&nbsp;<span style="background:'+(rec.type==='finance'?'#1A1040':'#0A2818')+';color:'+(rec.type==='finance'?'#7C5CEF':'#1DB954')+';border:1px solid '+(rec.type==='finance'?'#7C5CEF40':'#1DB95440')+';border-radius:4px;padding:0 6px;font-size:9px;font-family:\'DM Mono\',monospace;font-weight:700;">'+(rec.type==='finance'?'FINANCED':'CASH')+'</span><div style="color:#F0F5FF;font-weight:700;font-size:14px;margin-top:3px;">'+proj.name+'</div><div style="color:#7A8FA8;font-size:10px;">Handler: <span style="color:#E8B84B;">'+rec.handler+'</span>'+(rec.lender?' &middot; '+rec.lender:'')+'</div></div><div style="text-align:right;"><div style="color:#E8B84B;font-family:\'DM Mono\',monospace;font-weight:800;font-size:14px;">'+fmt$(paid)+' <span style="color:#3A4F68;font-size:10px;">/ '+fmt$(owed)+'</span></div><div style="color:#7A8FA8;font-size:9px;">'+pct+'% collected</div><div class="pb" style="width:100px;height:5px;margin-top:4px;margin-left:auto;"><div class="pf" style="width:'+pct+'%;background:'+(pct===100?'#1DB954':'#1B5FAA')+';"></div></div></div></div>';
    h+='<div style="background:#08111F;border-radius:8px;overflow:hidden;border:1px solid #162540;"><div style="display:grid;grid-template-columns:2.5fr 1fr 1fr .8fr .9fr .9fr 30px;padding:6px 11px;border-bottom:1px solid #162540;color:#3A4F68;font-size:9px;letter-spacing:.08em;font-family:\'DM Mono\',monospace;"><div>MILESTONE</div><div>DUE</div><div>COLLECTED</div><div>STATUS</div><div>DATE</div><div>METHOD</div><div></div></div>';
    rec.payments.forEach((pay,i)=>{
      const isNA=pay.status==='n/a'||pay.status==='declined',isOK=pay.status==='collected',isPend=pay.status==='pending';
      h+='<div style="display:grid;grid-template-columns:2.5fr 1fr 1fr .8fr .9fr .9fr 30px;padding:9px 11px;border-bottom:'+(i<rec.payments.length-1?'1px solid #162540':'none')+';align-items:center;background:'+(isOK?'#1DB95406':isPend&&pay.due>0?'#F5842A04':'transparent')+';"><div style="color:#F0F5FF;font-size:10px;">'+pay.milestone+'</div><div style="color:'+(isNA?'#3A4F68':'#E8B84B')+';font-family:\'DM Mono\',monospace;font-size:10px;font-weight:700;">'+(isNA?'—':fmt$(pay.due))+'</div><div style="color:'+(isOK?'#1DB954':'#3A4F68')+';font-family:\'DM Mono\',monospace;font-size:10px;font-weight:700;">'+(isNA?'—':isOK?fmt$(pay.collected):'—')+'</div><div>'+(isNA?'<span style="color:#3A4F68;font-size:8px;">N/A</span>':isOK?'<span style="color:#1DB954;font-size:8px;font-weight:700;">&#10003;</span>':isPend&&pay.due>0?'<span style="color:#F5842A;font-size:8px;font-weight:700;">PEND</span>':'<span style="color:#3A4F68;font-size:8px;">WAIT</span>')+'</div><div style="color:#7A8FA8;font-size:9px;font-family:\'DM Mono\',monospace;">'+pay.date+'<br><span style="color:#3A4F68;font-size:8px;">'+(pay.enteredBy||'')+'</span></div><div style="color:#7A8FA8;font-size:9px;">'+pay.method+'</div><div>'+(isPend&&pay.due>0?'<button onclick="showLogPay(\''+pid+'\',\''+pay.id+'\',\''+pay.milestone.replace(/'/g,"\\'")+'\',' +pay.due+')" style="background:#1B5FAA;border:none;border-radius:4px;width:24px;height:24px;color:#F0F5FF;cursor:pointer;font-size:12px;">+</button>':'')+'</div></div>';
    });
    h+='</div></div>';
  });
  el.innerHTML=h;
}

