function approveCO(id){
  const co=COS.find(c=>c.id===id);if(!co)return;
  co.status='approved';co.approvedBy='Gev Ashnalikyan';co.approvedDate=nowTS();
  fireNotif('CO '+id+' APPROVED by Gev Ashnalikyan — Notified: Ops, Sales Rep, Josh, Noam.','success');rFin();
}
function rejectCO(id){
  const co=COS.find(c=>c.id===id);if(!co)return;
  co.status='rejected';
  fireNotif('CO '+id+' REJECTED — Sales Rep and Operations notified.','warning');rFin();
}
function toggleCOFin(id,req){
  const co=COS.find(c=>c.id===id);if(!co)return;
  co.financeRequired=req;
  if(req&&!co.notified.includes('Pat Adirim'))co.notified.push('Pat Adirim');
  if(!req)co.notified=co.notified.filter(n=>n!=='Pat Adirim');
  fireNotif('CO '+id+': '+(req?'Finance required — Pat Adirim notified.':'Switched to cash.'),'info');rFin();
}

