  const paid=rec?rec.payments.reduce((a,p)=>a+p.collected,0):0;
  const owed=rec?rec.payments.reduce((a,p)=>a+p.due,0):0;
  const canNote=canOpsNotes(l);const notes=NOTES[id]||[];
  let h='<div class="modal-overlay" onclick="this.remove()"><div class="modal" style="width:680px;max-width:95vw;" onclick="event.stopPropagation()">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;"><div><div style="display:flex;gap:7px;align-items:center;margin-bottom:3px;">'+etag(l.entity)+'<span style="color:#3A4F68;font-family:\'DM Mono\',monospace;font-size:10px;">'+(l.woNum||l.id)+'</span>'+(l.hoa?'<span class="hoa-b '+(l.hoaStatus==='approved'?'ok':l.hoaStatus==='denied'?'no':'')+'" >HOA '+(l.hoaStatus||'PENDING').toUpperCase()+'</span>':'')+'</div><div style="color:#F0F5FF;font-family:\'Barlow Condensed\',sans-serif;font-size:20px;font-weight:800;">'+l.name+'</div><div style="color:#7A8FA8;font-size:11px;margin-top:1px;">'+(l.address||'')+' '+l.city+', CA '+(l.zip||'')+'</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;"><div style="color:#E8B84B;font-family:\'DM Mono\',monospace;font-weight:800;font-size:17px;">'+fmt$(l.value)+'</div><button onclick="this.closest(\'.modal-overlay\').remove()" style="background:none;border:none;color:#7A8FA8;cursor:pointer;font-size:17px;">&times;</button></div></div>';
  h+='<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;">'+chip(l.status,true);
  if(pco)h+='<span style="background:#2A1500;color:#F5842A;border:1px solid #F5842A40;border-radius:4px;padding:4px 9px;font-size:10px;font-family:\'DM Mono\',monospace;font-weight:700;">&#9888; '+pco.id+' PENDING</span>';
  if(l.status!=='canceled')h+='<button onclick="cancelJob(\''+l.id+'\');this.closest(\'.modal-overlay\').remove();" class="btn btn-sm btn-danger" style="margin-left:auto;">&times; CANCEL JOB</button>';
  h+='</div>';
  h+='<div class="g2" style="margin-bottom:13px;"><div><div class="sh">Contact Info</div>';
  [['Phone',l.phone],['Email',l.email||'—'],['Address',l.address||'—'],['City',l.city+', CA '+(l.zip||'')],['Product',l.product||'—'],['Source',l.source||'—'],['Rep',l.rep],['WO #',l.woNum||l.id],['Created',l.created]].forEach(([k,v])=>{
    h+='<div style="margin-bottom:6px;display:flex;gap:7px;"><div style="color:#7A8FA8;font-size:10px;min-width:66px;">'+k+':</div><div style="color:#F0F5FF;font-size:11px;font-weight:600;">'+v+'</div></div>';
  });
  h+='</div><div><div class="sh">Payment Status</div>';
  if(rec){
    h+='<div style="margin-bottom:7px;"><div style="color:#7A8FA8;font-size:10px;">Type</div><div style="color:#F0F5FF;font-size:12px;font-weight:700;">'+(rec.type==='finance'?'Financed — '+rec.lender:'Cash Payment')+'</div></div>';
    h+='<div style="margin-bottom:7px;"><div style="color:#7A8FA8;font-size:10px;">Collected</div><div style="color:#1DB954;font-size:17px;font-family:\'DM Mono\',monospace;font-weight:800;">'+fmt$(paid)+'</div></div>';
    h+='<div style="margin-bottom:7px;"><div style="color:#7A8FA8;font-size:10px;">Remaining</div><div style="color:#F5842A;font-size:13px;font-family:\'DM Mono\',monospace;font-weight:700;">'+fmt$(owed-paid)+'</div></div>';
    h+='<div class="pb" style="height:5px;"><div class="pf" style="width:'+(owed>0?Math.round((paid/owed)*100):0)+'%;background:'+(paid===owed?'#1DB954':'#1B5FAA')+';"></div></div>';
  } else { h+='<div style="color:#7A8FA8;font-size:11px;">No payment record yet.</div>'; }
  if(l.hoa){
    const hoaBg=l.hoaStatus==='approved'?'#0A2818':l.hoaStatus==='denied'?'#2A0A0C':'#3A2800';
    const hoaBc=l.hoaStatus==='approved'?'#1DB95440':l.hoaStatus==='denied'?'#E8424A40':'#C9952A40';
    const hoaCol=l.hoaStatus==='approved'?'#1DB954':l.hoaStatus==='denied'?'#E8424A':'#E8B84B';
    const hoaMsg=l.hoaStatus==='approved'?'HOA approved — project can proceed.':l.hoaStatus==='denied'?'HOA denied — Sales Rep notified.':'Waiting for HOA response via portal or joyce@cdwindows.com.';
    h+='<div style="margin-top:10px;padding:9px 11px;background:'+hoaBg+';border-radius:8px;border:1px solid '+hoaBc+';"><div style="color:'+hoaCol+';font-weight:700;font-size:11px;">HOA: '+(l.hoaStatus||'PENDING').toUpperCase()+'</div><div style="color:#7A8FA8;font-size:10px;margin-top:2px;">'+hoaMsg+'</div>';
    if(l.hoaStatus==='pending'&&(CU?.username==='joyce'||CU?.access==='all'))
      h+='<div style="display:flex;gap:5px;margin-top:7px;"><button onclick="approveHOA(\''+id+'\');this.closest(\'.modal-overlay\').remove();" class="btn btn-sm btn-success">&#10003; HOA APPROVED</button><button onclick="denyHOA(\''+id+'\');this.closest(\'.modal-overlay\').remove();" class="btn btn-sm btn-danger">&times; HOA DENIED</button></div>';
    h+='</div>';
  }
  h+='</div></div>';
  h+='<div class="sh">Documents ('+docs.length+')</div><div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px;">';
  docs.forEach(d=>{h+='<div style="background:#1A2E48;border-radius:8px;padding:9px 11px;border:1px solid #162540;min-width:160px;"><div style="font-size:18px;margin-bottom:3px;">'+(d.icon||'📄')+'</div><div style="color:#F0F5FF;font-size:10px;font-weight:700;margin-bottom:1px;">'+d.name+'</div><div style="color:#7A8FA8;font-size:9px;">'+d.type+'</div><div class="ts">'+d.uploadedBy+' &middot; '+d.role+'</div><div class="ts">'+d.ts+'</div></div>';});
  h+='<div onclick="showUploadDoc(\''+id+'\')" style="background:var(--navyHover);border:2px dashed var(--navyBorder);border-radius:8px;padding:9px 13px;cursor:pointer;display:flex;align-items:center;gap:5px;" onmouseenter="this.style.borderColor=\'#1B5FAA\'" onmouseleave="this.style.borderColor=\'#162540\'"><span style="color:#7A8FA8;font-size:17px;">+</span><span style="color:#7A8FA8;font-size:10px;">Upload</span></div></div>';
  if(canNote){
    h+='<div class="sh">Operations Notes ('+notes.length+')</div><div style="margin-bottom:11px;">';
    if(notes.length===0)h+='<div style="color:#7A8FA8;font-size:11px;margin-bottom:7px;">No ops notes yet.</div>';
    notes.forEach(n=>{h+='<div style="background:#1A2E48;border-radius:8px;padding:11px;border:1px solid #162540;margin-bottom:7px;"><div style="color:#F0F5FF;font-size:12px;line-height:1.5;margin-bottom:5px;">'+n.text+'</div><div class="ts">'+n.by+' ('+n.role+') &middot; '+n.ts+'</div></div>';});
    if(CU?.access==='operations'||CU?.access==='all')h+='<div style="display:flex;gap:7px;"><textarea id="ops-txt" class="fi" rows="2" placeholder="Add operations note..." style="flex:1;resize:vertical;"></textarea><button onclick="addOpsNote(\''+id+'\')" class="btn btn-sm btn-primary" style="align-self:flex-end;">ADD NOTE</button></div>';
    h+='</div>';
  }
  if(l.notes)h+='<div class="sh">Project Notes</div><div style="background:#08111F;border-radius:8px;padding:11px;border:1px solid #162540;color:#F0F5FF;font-size:12px;line-height:1.6;margin-bottom:13px;">'+l.notes+'</div>';
  h+='<div style="display:flex;gap:7px;flex-wrap:wrap;"><button class="btn btn-success btn-sm" onclick="LEADS.find(l=>l.id===\''+id+'\').status=\'sold\';this.closest(\'.modal-overlay\').remove();fireNotif(\'Marked SOLD: '+l.name+'\',\'success\');nav(curMod);">&#10003; MARK SOLD</button><button class="btn btn-primary btn-sm" onclick="showUploadDoc(\''+id+'\')">UPLOAD DOC</button><button class="btn btn-sm" style="background:none;border:1px solid #F5842A;color:#F5842A;border-radius:8px;padding:6px 11px;font-size:10px;cursor:pointer;font-family:\'Barlow Condensed\',sans-serif;font-weight:700;" onclick="window.open(\'https://cdwindows.freshdesk.com/support/home\',\'_blank\');fireNotif(\'Service ticket portal opened.\',\'info\');">SERVICE TICKET</button><button class="btn btn-ghost btn-sm" onclick="this.closest(\'.modal-overlay\').remove()">CLOSE</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
}
function addOpsNote(id){
  const txt=document.getElementById('ops-txt')?.value?.trim();if(!txt)return;
  if(!NOTES[id])NOTES[id]=[];
  NOTES[id].push({id:'N'+Date.now(),text:txt,by:CU?.name||'Ops',role:CU?.title||'Operations',ts:nowTS()});
  document.querySelector('.modal-overlay')?.remove();
  fireNotif('Operations note added.','success');
}
function approveHOA(id){
  const l=LEADS.find(l=>l.id===id);if(!l)return;
  l.hoaStatus='approved';l.status='hoa_approved';
  fireNotif('HOA APPROVED: '+l.name+' — Rosario notified to send file to David Soriano (factory).','success');nav(curMod);
}
function denyHOA(id){
  const l=LEADS.find(l=>l.id===id);if(!l)return;
  l.hoaStatus='denied';l.status='hoa_denied';
  fireNotif('HOA DENIED: '+l.name+' — '+l.rep+' and Management notified.','danger');nav(curMod);
}

// ── SALES ──────────────────────────────────────────────
