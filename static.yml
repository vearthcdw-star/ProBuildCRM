<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>California Deluxe Windows — Operations Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@600;700;800;900&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#08111F;--navyCard:#0D1B2E;--navyBorder:#162540;--navyHover:#1A2E48;
  --blue:#1B5FAA;--blueDim:#0D3060;--blueGlow:#1B5FAA44;
  --gold:#C9952A;--goldLight:#E8B84B;--goldDim:#3A2800;
  --white:#F0F5FF;--muted:#7A8FA8;--dimmed:#3A4F68;
  --green:#1DB954;--greenDim:#0A2818;
  --red:#E8424A;--redDim:#2A0A0C;
  --orange:#F5842A;--orangeDim:#2A1500;
  --purple:#7C5CEF;--purpleDim:#1A1040;
  --teal:#22C5C5;
}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-thumb{background:var(--navyBorder);border-radius:4px;}
input,select,textarea{font-family:'Barlow',sans-serif;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.fade-in{animation:fadeIn .25s ease forwards;}
#login-screen{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,#0D3060 0%,#08111F 70%);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-card{background:var(--navyCard);border-radius:20px;padding:44px;width:440px;border:1px solid var(--navyBorder);box-shadow:0 40px 80px #000000B0;}
.login-logo{display:block;width:260px;margin:0 auto 10px;}
.lin{width:100%;background:var(--navyHover);border:1px solid var(--navyBorder);border-radius:10px;padding:13px 15px;color:var(--white);font-size:14px;outline:none;font-family:inherit;margin-bottom:11px;transition:border-color .2s;}
.lin:focus{border-color:var(--blue);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--blue),#1246AA);border:none;border-radius:10px;padding:14px;color:var(--white);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:.08em;cursor:pointer;margin-top:4px;}
.login-btn:hover{opacity:.9;}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:8px;font-family:'DM Mono',monospace;display:none;}
.login-forgot{color:var(--dimmed);font-size:11px;text-align:center;margin-top:12px;cursor:pointer;font-family:'DM Mono',monospace;}
.login-forgot:hover{color:var(--blue);}
.login-footer{color:var(--dimmed);font-size:9px;text-align:center;margin-top:16px;font-family:'DM Mono',monospace;border-top:1px solid var(--navyBorder);padding-top:14px;}
.demo-toggle{position:fixed;bottom:18px;right:18px;z-index:500;display:none;align-items:center;gap:9px;background:var(--navyCard);border:1px solid var(--navyBorder);border-radius:30px;padding:9px 16px;box-shadow:0 8px 24px #00000060;cursor:pointer;}
.demo-toggle.on{border-color:var(--gold);background:#3A280060;}
.demo-dot{width:9px;height:9px;border-radius:50%;background:var(--dimmed);}
.demo-toggle.on .demo-dot{background:var(--gold);}
.demo-lbl{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;}
.demo-toggle.on .demo-lbl{color:var(--gold);}
#app{display:none;min-height:100vh;flex-direction:row;}
#sidebar{width:220px;background:var(--navyCard);border-right:1px solid var(--navyBorder);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow:hidden;}
.sb-logo{padding:13px;border-bottom:1px solid var(--navyBorder);}
.sb-logo-img{width:158px;display:block;margin-bottom:5px;}
.etag{border-radius:3px;padding:1px 6px;font-size:9px;font-weight:800;letter-spacing:.1em;font-family:'DM Mono',monospace;cursor:pointer;text-decoration:none;}
.etag-cdw{background:var(--blueDim);color:var(--blue);border:1px solid #1B5FAA40;}
.etag-dlc{background:var(--goldDim);color:var(--gold);border:1px solid #C9952A40;}
nav{flex:1;padding:7px 6px;overflow-y:auto;}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;background:none;border:1px solid transparent;border-radius:9px;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;font-size:12px;text-align:left;margin-bottom:2px;transition:all .15s;}
.nb:hover{background:var(--navyHover);color:var(--white);}
.nb.active{background:#1B5FAA20;border-color:#1B5FAA40;color:var(--white);}
.nbadge{background:var(--orange);color:var(--white);border-radius:10px;font-size:9px;font-family:'DM Mono',monospace;font-weight:700;padding:1px 5px;margin-left:auto;flex-shrink:0;}
.nbadge.purple{background:var(--purple);}
.sb-fin{padding:9px 11px;border-top:1px solid var(--navyBorder);border-bottom:1px solid var(--navyBorder);}
.sf-av{width:21px;height:21px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--goldDim));display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:var(--white);font-family:'DM Mono',monospace;flex-shrink:0;}
.sb-user{padding:9px 11px;}
.su-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blueDim));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;color:var(--white);font-family:'Barlow Condensed',sans-serif;flex-shrink:0;}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
#topbar{height:50px;background:var(--navyCard);border-bottom:1px solid var(--navyBorder);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:100;}
#content{flex:1;overflow-y:auto;padding:22px;transition:padding-right .3s ease;}
.card{background:var(--navyCard);border-radius:12px;border:1px solid var(--navyBorder);}
.sh{color:var(--muted);font-size:10px;letter-spacing:.1em;font-family:'DM Mono',monospace;font-weight:700;margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--navyBorder);text-transform:uppercase;}
.sc{background:var(--navyCard);border-radius:12px;border:1px solid var(--navyBorder);padding:15px 17px;}
.sl{color:var(--muted);font-size:10px;letter-spacing:.1em;font-family:'DM Mono',monospace;margin-bottom:5px;}
.sv{font-size:25px;font-weight:800;font-family:'Barlow Condensed',sans-serif;line-height:1;}
.ss{color:var(--muted);font-size:11px;margin-top:4px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.btn{border:none;border-radius:8px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;transition:all .15s;}
.btn-primary{background:var(--blue);color:var(--white);}
.btn-success{background:var(--green);color:var(--navy);}
.btn-danger{background:var(--red);color:var(--white);}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-ghost{background:none;color:var(--muted);border:1px solid var(--navyBorder);}
.btn-outline{background:none;color:var(--blue);border:1px solid var(--blue);}
.btn-warning{background:var(--orange);color:var(--white);}
.btn-purple{background:var(--purple);color:var(--white);}
.btn-sm{padding:6px 11px;font-size:11px;}
.btn-md{padding:10px 19px;font-size:13px;}
.chip{display:inline-flex;align-items:center;gap:3px;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:.05em;font-family:'DM Mono',monospace;white-space:nowrap;border:1px solid transparent;}
.tabs{display:flex;gap:2px;background:var(--navyCard);border-radius:10px;padding:3px;width:fit-content;border:1px solid var(--navyBorder);margin-bottom:18px;flex-wrap:wrap;}
.tab{background:none;border:none;border-radius:7px;padding:7px 17px;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.05em;font-size:12px;display:flex;align-items:center;gap:6px;transition:all .15s;}
.tab.active{background:var(--blue);color:var(--white);}
.modal-overlay{position:fixed;inset:0;background:#00000090;display:flex;align-items:center;justify-content:center;z-index:900;}
.modal{background:var(--navyCard);border-radius:16px;padding:26px;border:1px solid var(--navyBorder);box-shadow:0 32px 80px #00000090;width:520px;max-width:92vw;max-height:88vh;overflow-y:auto;}
.fi{width:100%;background:var(--navyHover);border:1px solid var(--navyBorder);border-radius:8px;padding:9px 13px;color:var(--white);font-size:13px;outline:none;box-sizing:border-box;font-family:inherit;}
.fl{color:var(--muted);font-size:10px;letter-spacing:.08em;font-family:'DM Mono',monospace;display:block;margin-bottom:4px;}
.fg{margin-bottom:11px;}
.pb{background:var(--navyHover);border-radius:8px;overflow:hidden;}
.pf{height:100%;border-radius:8px;transition:width .5s ease;}
.ts{color:var(--dimmed);font-size:9px;font-family:'DM Mono',monospace;margin-top:2px;}
.upload-zone{border:2px dashed var(--navyBorder);border-radius:12px;padding:30px;text-align:center;cursor:pointer;transition:all .2s;}
.upload-zone:hover{border-color:var(--blue);background:#1B5FAA08;}
.notif-drop{position:absolute;right:0;top:44px;width:370px;background:var(--navyCard);border:1px solid var(--navyBorder);border-radius:12px;box-shadow:0 12px 40px #00000070;z-index:200;overflow:hidden;display:none;}
.notif-drop.open{display:block;}
#ai-panel{position:fixed;right:0;top:0;bottom:0;width:390px;background:var(--navyCard);border-left:1px solid var(--navyBorder);display:flex;flex-direction:column;z-index:1000;box-shadow:-12px 0 40px #00000070;transform:translateX(100%);transition:transform .3s ease;}
#ai-panel.open{transform:translateX(0);}
#ai-msgs{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:9px;}
.hoa-b{background:#3A2800;color:#E8B84B;border:1px solid #C9952A40;border-radius:4px;padding:1px 6px;font-size:8px;font-family:'DM Mono',monospace;font-weight:800;}
.hoa-b.ok{background:var(--greenDim);color:var(--green);border-color:#1DB95440;}
.hoa-b.no{background:var(--redDim);color:var(--red);border-color:#E8424A40;}
.pipe-board{display:flex;gap:9px;overflow-x:auto;padding-bottom:8px;}
.pipe-col{width:188px;background:var(--navyCard);border-radius:12px;border:1px solid var(--navyBorder);overflow:hidden;flex-shrink:0;}
.pipe-hdr{padding:9px 11px;border-bottom:2px solid;}
.pipe-cards{padding:6px;display:flex;flex-direction:column;gap:5px;max-height:320px;overflow-y:auto;}
.pipe-card{background:var(--navyHover);border-radius:7px;padding:8px;border:1px solid var(--navyBorder);cursor:pointer;transition:border-color .15s;}
.tbl-hdr{padding:7px 13px;border-bottom:1px solid var(--navyBorder);color:var(--dimmed);font-size:9px;letter-spacing:.08em;font-family:'DM Mono',monospace;display:grid;align-items:center;}
.tbl-row{padding:10px 13px;border-bottom:1px solid var(--navyBorder);display:grid;align-items:center;cursor:pointer;transition:background .12s;}
.tbl-row:hover{background:var(--navyHover);}
.tbl-row:last-child{border-bottom:none;}
</style>
</head>
<body>
<div id="login-screen" style="display:none;"><div class="login-card fade-in">
<img src="data:image/png;base64," class="login-logo" alt="CDW Logo"/>
<div style="color:var(--muted);font-size:11px;text-align:center;font-family:'DM Mono',monospace;letter-spacing:.08em;margin-bottom:4px;">We Build. We Design. We Install.</div>
