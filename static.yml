function confirmPay(pid,payId){
  const amt=parseFloat(document.getElementById('pa')?.value)||0;
  const method=document.getElementById('pm')?.value||'Check';
  const date=document.getElementById('pd')?.value||new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const rec=FR[pid];
  if(rec){const pay=rec.payments.find(p=>p.id==payId);if(pay){pay.collected=amt;pay.status='collected';pay.method=method;pay.date=date;pay.enteredBy='Daniel Alcalde';pay.ts=nowTS();}}
  fireNotif('Payment logged: '+fmt$(amt)+' via '+method+' — Project '+pid+'. Daniel Alcalde &middot; '+nowTS(),'success');
  ft='payments';rFin();
}
