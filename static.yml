  el.innerHTML=h;
}

// ── FINANCE ────────────────────────────────────────────
function rFin(){
  const el=document.getElementById('mc');
  const allPay=Object.values(FR).flatMap(r=>r.payments);
  const tc=allPay.reduce((a,p)=>a+p.collected,0),td=allPay.reduce((a,p)=>a+p.due,0);
  const pendCOs=COS.filter?.(c=>c.status==='pending').length||0;
  const pendFin=Object.values(FR).filter(r=>r.status==='pending').length;
  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><div><h2 style="color:#F0F5FF;font-size:22px;font-family:\'Barlow Condensed\',sans-serif;font-weight:800;letter-spacing:.05em;margin:0 0 3px;">FINANCE &amp; PAYMENTS</h2><p style="color:#7A8FA8;font-size:11px;margin:0;">Pat Adirim (Finance Mgr / Sales Admin) &middot; Daniel Alcalde (A/R) &middot; Change Orders</p></div><a href="https://retailservices.wellsfargo.com/ahapp/init-app?m=0024322380&amp;l=en_US" target="_blank" class="btn btn-sm" style="background:none;border:1px solid #E8B84B;color:#E8B84B;border-radius:8px;padding:6px 11px;font-size:10px;cursor:pointer;font-family:\'Barlow Condensed\',sans-serif;font-weight:700;text-decoration:none;">WELLS FARGO APP &#8599;</a></div>';
  h+='<div class="tabs">';
  [['overview','Overview','⊞',0],['payments','Payments','$',0],['financing','Financing','💳',pendFin],['cos','Change Orders','✏',pendCOs]].forEach(([k,l,i,b])=>{
    h+='<button class="tab'+(ft===k?' active':'')+'" onclick="ft=\''+k+'\';rFin();"><span>'+i+'</span>'+l+(b>0?'<span style="background:'+(k==='cos'?'#F5842A':'#7C5CEF')+';color:white;border-radius:10px;font-size:9px;font-family:\'DM Mono\',monospace;font-weight:700;padding:1px 5px;">'+b+'</span>':'')+'</button>';
  });
  h+='</div><div id="fin-tab"></div>';
  el.innerHTML=h;
  const fc=document.getElementById('fin-tab');
  if(ft==='overview')rFinOv(fc,tc,td,pendCOs);
  else if(ft==='payments')rFinPay(fc,tc,td);
  else if(ft==='financing')rFinancing(fc);
  else if(ft==='cos')rCOs(fc);
}

function rFinOv(el,tc,td,pendCOs){
  const action=LEADS.filter(l=>['finance_declined','pending_finance','change_order_needed'].includes(l.status));
  let h='<div class="g4" style="margin-bottom:16px;"><div class="sc"><div class="sl">TOTAL COLLECTED</div><div class="sv" style="color:#1DB954;">'+fmt$(tc)+'</div></div><div class="sc"><div class="sl">OUTSTANDING A/R</div><div class="sv" style="color:#F5842A;">'+fmt$(td-tc)+'</div></div><div class="sc"><div class="sl">FINANCE PENDING</div><div class="sv" style="color:#7C5CEF;">'+Object.values(FR).filter(r=>r.status==='pending').length+'</div></div><div class="sc"><div class="sl">CHANGE ORDERS</div><div class="sv" style="color:'+(pendCOs>0?'#F5842A':'#1DB954')+' ;">'+pendCOs+'</div></div></div>';
  h+='<div class="card" style="padding:18px;margin-bottom:13px;"><div class="sh">Requires Immediate Action</div>';
  if(action.length===0)h+='<div style="color:#1DB954;font-size:12px;text-align:center;padding:12px 0;">&#10003; No immediate actions.</div>';
  action.forEach(p=>{
    const rec=FR[p.id];
    const bg=p.status==='finance_declined'?'#2A0A0C':p.status==='change_order_needed'?'#2A1500':'#1A1040';
    const bc=p.status==='finance_declined'?'#E8424A':p.status==='change_order_needed'?'#F5842A':'#7C5CEF';
