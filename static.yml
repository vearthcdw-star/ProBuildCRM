  <div style="display:flex;gap:7px;">
    <div style="width:21px;height:21px;border-radius:5px;background:linear-gradient(135deg,var(--blue),var(--gold));display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:2px;">&#10022;</div>
    <div style="max-width:84%;padding:9px 12px;border-radius:2px 12px 12px 12px;background:var(--navyHover);color:var(--white);font-size:12px;line-height:1.6;border:1px solid var(--navyBorder);">Hi! CDW AI here. I can draft finance decline notices, CO notifications, HOA emails, payment summaries, and more. What do you need?</div>
  </div>
</div>
<div style="padding:7px 13px;border-top:1px solid var(--navyBorder);">
  <div style="color:var(--muted);font-size:9px;font-family:'DM Mono',monospace;margin-bottom:5px;letter-spacing:.08em;">QUICK PROMPTS</div>
