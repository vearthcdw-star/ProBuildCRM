IGN SALES REP</label><select id="nl-re" class="fi"><option value="Unassigned">Unassigned</option>'+opts+'</select></div><div style="grid-column:1/-1;" class="fg"><label class="fl">HOA REQUIRED?</label><div style="display:flex;gap:12px;margin-top:4px;"><label style="display:flex;align-items:center;gap:6px;color:#7A8FA8;font-size:12px;cursor:pointer;"><input type="radio" name="nl-hoa" value="no" checked/> No HOA</label><label style="display:flex;align-items:center;gap:6px;color:#E8B84B;font-size:12px;cursor:pointer;"><input type="radio" name="nl-hoa" value="yes"/> Yes &mdash; HOA Required</label></div></div><div style="grid-column:1/-1;" class="fg"><label class="fl">NOTES</label><textarea id="nl-no" class="fi" rows="2" placeholder="Any important details..."></textarea></div></div><div style="display:flex;gap:9px;margin-top:13px;"><button class="btn btn-ghost btn-md" onclick="this.closest(\'.modal-overlay\').remove()" style="flex:1;">CANCEL</button><button class="btn btn-primary btn-md" onclick="createLead()" style="flex:2;">CREATE LEAD &rarr;</button></div></div></div>');
}
function createLead(){
  const name=document.getElementById('nl-n')?.value?.trim();
  const phone=document.getElementById('nl-ph')?.value?.trim();
  const city=document.getElementById('nl-ci')?.value?.trim();
  if(!name||!phone||!city){alert('Name, Phone, and City are required.');return;}
  const hoaVal=document.querySelector('input[name="nl-hoa"]:checked')?.value==='yes';
  const id='P'+Date.now().toString().slice(-6);
  const wo=document.getElementById('nl-wo')?.value?.trim()||'WO-'+Date.now().toString().slice(-5);
  const lead={id,woNum:wo,name,phone,email:document.getElementById('nl-em')?.value||'',address:document.getElementById('nl-ad')?.value||'',city,zip:document.getElementById('nl-zi')?.value||'',source:document.getElementById('nl-sr')?.value||'Door Knock',entity:document.getElementById('nl-en')?.value||'CDW',product:document.getElementById('nl-pr')?.value||'TBD',value:parseFloat(document.getElementById('nl-va')?.value)||0,rep:document.getElementById('nl-re')?.value||'Unassigned',notes:document.getElementById('nl-no')?.value||'',status:'new_lead',hoa:hoaVal,hoaStatus:hoaVal?'pending':'none',nextAppt:'—',created:nowTS()};
  LEADS.push(lead);DOCS[id]=[];NOTES[id]=[];
  document.querySelector('.modal-overlay')?.remove();
  fireNotif('New lead: '+name+' ('+wo+') Rep: '+lead.rep,'success');
  if(hoaVal)fireNotif('HOA Required for '+name+' — Joyce Bosnoyan notified.','info');
  rMktg();
}

function showDetail(id){
