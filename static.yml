  <button class="nb active" onclick="nav('dashboard')" id="nb-dashboard"><span style="font-size:13px;width:17px;text-align:center;flex-shrink:0;">&#9862;</span><span>DASHBOARD</span></button>
  <button class="nb" onclick="nav('marketing')" id="nb-marketing"><span style="font-size:13px;width:17px;">&#128227;</span><span>MARKETING</span></button>
