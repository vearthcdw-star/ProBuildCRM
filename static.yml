function approveFin(pid){
  const rec=FR[pid];if(!rec)return;
  rec.status='approved';rec.approvedDate=nowTS();rec.approvedAmt=LEADS.find(l=>l.id===pid)?.value||0;
  const lead=LEADS.find(l=>l.id===pid);if(lead)lead.status='finance_approved';
  fireNotif('Finance APPROVED: '+(lead?.name)+' — Proceed to measure scheduling.','success');rFin();
}
function declineFin(pid){
  const rec=FR[pid];const lead=LEADS.find(l=>l.id===pid);
  if(rec)rec.status='declined';if(lead)lead.status='finance_declined';
  fireNotif('Finance DECLINED: '+(lead?.name)+' — Notified: Ops, '+lead?.rep+', Gev, Josh, Noam.','warning');rFin();
}

